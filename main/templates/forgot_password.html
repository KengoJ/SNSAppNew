{% extends 'layout.html' %}
{% block content %}
<section class="auth-page">
    <form class="auth-card" method="POST">
        <div class="text-center mb-4">
            <p class="eyebrow">Reset password</p>
            <h1>パスワード再設定</h1>
            <p class="muted-text mt-2">ユーザーIDを入力して、新しいパスワードを設定します。</p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                <div class="flash mb-3">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="mb-3">
            <label for="login_user_id">ユーザーID</label>
            <input id="login_user_id" class="form-control" type="text" name="login_user_id" required>
        </div>
        <div class="mb-4">
            <label for="new_password">新しいパスワード</label>
            <input id="new_password" class="form-control" type="password" name="new_password" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">送信</button>
    </form>
</section>
{% endblock %}
