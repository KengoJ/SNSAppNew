{% extends 'layout.html' %}
{% block content %}
<section class="auth-page">
    <form class="auth-card" action="/signup" method="POST">
        <div class="text-center mb-4">
            <img class="auth-logo mb-3" src="{{ url_for('static', filename='imgs/sign_in/sign_in_page.png') }}" alt="登録アイコン">
            <p class="eyebrow">Create account</p>
            <h1>新規登録</h1>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="flash mb-3">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <div class="mb-3">
            <label for="username">ユーザー名</label>
            <input id="username" type="text" name="username" class="form-control" placeholder="山田太郎1234" required autofocus>
        </div>
        <div class="mb-3">
            <label for="login_user_id">ユーザーID</label>
            <input id="login_user_id" type="text" name="login_user_id" class="form-control" placeholder="example1234" required>
        </div>
        <div class="mb-4">
            <label for="password">パスワード</label>
            <input id="password" type="password" name="password" class="form-control" placeholder="Password" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">登録する</button>

        <div class="text-center mt-4">
            <a href="/login">すでにアカウントをお持ちの方</a>
        </div>
    </form>
</section>
{% endblock %}
